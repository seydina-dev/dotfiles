# Updated Window Rules for Hyprland 0.53+
# See: https://hypr.land/news/update53/ and https://wiki.hypr.land/Configuring/Window-Rules/

# Basic floating rules
windowrule = float 1, match:class ^(org.kde.polkit-kde-authentication-agent-1)$
windowrule = float 1, match:class ^(nm-connection-editor|blueman-manager|overskride)$
windowrule = float 1, match:class ^(swayimg|vlc|Viewnior|pavucontrol)$
windowrule = float 1, match:class ^(nwg-look|qt5ct|mpv)$
windowrule = float 1, match:class ^(onedriver|onedriver-launcher)$
windowrule = float 1, match:class ^(zoom)$
windowrule = float 1, match:class ^(scrcpy)$
windowrule = float 1, match:class ^(wofi)$

# gamescope / noblur / fullscreen examples
windowrule = no_blur 1, match:class ^(gamescope)$
windowrule = fullscreen 1, match:class ^(gamescope)$
windowrule = workspace 6 silent, match:class ^(gamescope)$

# example: workspace + floating
windowrule = workspace 3, match:float 1, match:class ^(scrcpy)$

# keep the existing v2 examples from the old file for reference
windowrule = suppress_event maximize, match:class .*
windowrule = no_focus 1, match:class ^$, match:title ^$, match:xwayland 1, match:float 1, match:fullscreen 0, match:pin 0
windowrule = workspace 2, match:class ^(firefox)$
windowrule = workspace 4, match:class ^(google-chrome)$
windowrule = workspace 5, match:class ^(Zed)$ match:title ^(Zed)$
windowrule = workspace 3, match:class ^(thunar)$
windowrule = workspace 1, match:class ^(thunderbird)$
windowrule = workspace 4, match:class ^(com.obsproject.Studio)$
windowrule = workspace 5 silent, match:class ^(Steam)$, match:title ^(Steam)$
windowrule = workspace 5 silent, match:class ^(lutris)$
windowrule = workspace 6, match:class ^(virt-manager)$
windowrule = workspace 7 silent, match:class ^(discord)$
windowrule = workspace 9 silent, match:class ^(audacious)$

# opacity / bordercolor / pinned examples
windowrule = opacity 0.9 0.7, match:class ^(firefox)$
windowrule = opacity 1.0 0.8, match:class ^(thunar)$
windowrule = opacity 0.7 0.7, match:class ^(foot)$
windowrule = opacity 0.9 0.7, match:class ^(mousepad)$
windowrule = opacity 0.9 0.7, match:class ^(codium-url-handler)$
windowrule = opacity 0.9 0.7, match:class ^(VSCodium)$
windowrule = border_color rgb(EE4B55) rgb(880808), match:fullscreen 1
# windowrule = border_color rgb(282737) rgb(1E1D2D), match:float 1
windowrule = opacity 1.0 0.6, match:pin 1
